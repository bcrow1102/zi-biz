<section class="namecard-tool" id="namecardTool">
    <div class="namecard-tool-head">
        <p class="namecard-kicker">DIGITAL NAMECARD</p>
        <h3>디지털 명함 생성</h3>
    </div>

    <div class="namecard-tool-grid namecard-tool-grid--compact">
        <section class="namecard-form-area">
            <div class="namecard-form-block namecard-form-block--single">
                <div class="namecard-form-title-row">
                    <h4>명함 정보 입력</h4>

                    <label class="namecard-template-mini">
                        <span>시안</span>
                        <select id="ncTemplate">
                            <option value="template-red" selected>시안 1</option>
                            <option value="template-blue">시안 2</option>
                            <option value="template-gold">시안 3</option>
                        </select>
                    </label>
                </div>

                <div class="namecard-field-grid namecard-field-grid--3">
                    <label class="namecard-field">
                        <span>이름</span>
                        <input type="text" id="ncName" placeholder="예시) 김지모" />
                    </label>

                    <label class="namecard-field">
                        <span>직함</span>
                        <input type="text" id="ncRole" placeholder="예시) 팀장" />
                    </label>

                    <label class="namecard-field">
                        <span>휴대폰</span>
                        <input type="tel" id="ncPhone" placeholder="예시) 010-0000-0000" />
                    </label>
                </div>

                <div class="namecard-field-grid namecard-field-grid--2">
                    <label class="namecard-field">
                        <span>현장명 / 회사명</span>
                        <input type="text" id="ncCompany" placeholder="예시) 문수로 써밋 블루밍" />
                    </label>

                    <label class="namecard-field">
                        <span>대표번호</span>
                        <input type="tel" id="ncLandline" placeholder="예시) 052-000-0000" />
                    </label>
                </div>

                <label class="namecard-field">
                    <span>한 줄 소개</span>
                    <input type="text" id="ncSummary" placeholder="예시) 울산 신규 아파트 상담 안내" />
                </label>

                <label class="namecard-field">
                    <span>주소</span>
                    <input type="text" id="ncAddress" placeholder="예시) 울산 남구 삼산로 00" />
                </label>

                <div class="namecard-field-grid namecard-field-grid--2 namecard-field-grid--contact-long">
                    <label class="namecard-field">
                        <span>이메일</span>
                        <input type="email" id="ncEmail" placeholder="예시) hello@zimo.kr" />
                    </label>

                    <label class="namecard-field">
                        <span>연결 주소</span>
                        <input type="url" id="ncWebsite" placeholder="예시) https://www.zimo.kr" />
                    </label>
                </div>
            </div>
        </section>

        <section class="namecard-preview-area">
            <div class="namecard-preview-top">
                <div>
                    <p class="namecard-kicker">PREVIEW</p>
                    <h4>카톡 미리보기</h4>
                </div>

                <button type="button" class="namecard-reset-btn" id="ncResetBtn">
                    초기화
                </button>
            </div>

            <article class="namecard-preview-scene namecard-preview-scene--compact">
                <a class="namecard-card template-red" id="ncCard" href="https://www.zimo.kr" target="_blank"
                    rel="noopener">
                    <div class="namecard-card-inner">
                        <div class="namecard-card-top">
                            <div class="namecard-logo" id="ncPreviewCompany">zimo biz</div>

                            <div class="namecard-person">
                                <span id="ncPreviewRole">팀장</span>
                                <strong id="ncPreviewName">김지모</strong>
                            </div>
                        </div>

                        <div class="namecard-divider"></div>

                        <div class="namecard-card-middle">
                            <strong id="ncPreviewSummary">울산 신규 아파트 상담 안내</strong>
                            <p id="ncPreviewAddress">울산 남구 삼산로 00</p>
                        </div>

                        <div class="namecard-card-bottom">
                            <div class="namecard-info-col">
                                <span>Mobile</span>
                                <strong id="ncPreviewPhone">010-0000-0000</strong>
                            </div>

                            <div class="namecard-info-col">
                                <span>Tel</span>
                                <strong id="ncPreviewLandline">052-000-0000</strong>
                            </div>

                            <div class="namecard-info-col namecard-info-col--wide">
                                <span>E-mail</span>
                                <strong id="ncPreviewEmail">hello@zimo.kr</strong>
                            </div>
                        </div>
                    </div>
                </a>
            </article>

            <div class="namecard-actions">
                <button type="button" class="namecard-action-btn namecard-action-btn--primary" id="ncCopyTextBtn">
                    <span class="namecard-btn-icon" aria-hidden="true">⧉</span>
                    공유 URL 복사
                </button>

                <button type="button" class="namecard-action-btn" id="ncSaveVcardBtn">
                    입력내용 저장
                </button>
            </div>

            <p class="namecard-helper" id="ncHelperText">
                입력한 내용은 현재 브라우저에서만 임시로 미리보기 됩니다.
            </p>
        </section>
    </div>
</section>
